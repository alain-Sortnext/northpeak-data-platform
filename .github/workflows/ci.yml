# NorthPeak Data Platform - CI/CD Pipeline
# Phase 4: GitHub Actions
# Enterprise equivalent: Azure DevOps Pipelines / Jenkins
#
# Runs on every PR to main and every push to main.
# PRs MUST pass all checks before merge is permitted.

name: NorthPeak Data Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DBT_VERSION: "1.8.0"

jobs:
  # ── Job 1: Python lint and unit tests ─────────────────────────
  pytest:
    name: pytest - unit and quality tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest quality/pytest/ \
            --cov=ingestion \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()

  # ── Job 2: dbt compile check ──────────────────────────────────
  dbt-compile:
    name: dbt compile - validate SQL syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: pip install dbt-duckdb==${{ env.DBT_VERSION }}

      - name: dbt compile
        working-directory: dbt
        run: |
          dbt deps
          dbt compile --profiles-dir . --target dev
        env:
          DBT_PROFILES_DIR: .

  # ── Job 3: Terraform validate ─────────────────────────────────
  terraform-validate:
    name: terraform validate - IaC syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

  # ── Job 4: Security scan ──────────────────────────────────────
  security:
    name: security scan - no secrets in code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
