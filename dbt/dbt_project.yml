name: northpeak
version: '1.0.0'
config-version: 2

profile: northpeak

model-paths: ["models"]
test-paths: ["tests"]
docs-paths: ["docs"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  northpeak:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["intermediate"]
    marts:
      +materialized: incremental
      +schema: marts
      +tags: ["gold"]

seeds:
  northpeak:
    +schema: seeds

sources:
  northpeak:
    silver:
      schema: silver
      tables:
        - name: orders
          description: "Cleansed orders from NP Core Silver layer"
          freshness:
            warn_after: {count: 25, period: hour}
            error_after: {count: 49, period: hour}
          loaded_at_field: _silver_cleansed_at
